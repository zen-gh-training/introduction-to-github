name: Step 3 # プルリクエストを開く

# 学習者がステップ3のタスクを完了したか確認します。
# - ユーザーがプルリクエストを作成または編集したときにトリガーされます。
# - プルリクエストのタイトルと説明を確認します。PRコメントを追加します。
# - すべてのチェックに合格すると、再実行されないようにワークフローが無効化されます。その結果、ワークフローのステータスバッジが緑色に変わります。

on:
  pull_request:
    branches:
      - main
    types:
      - opened
      - synchronize
      - reopened
      - edited

permissions:
  contents: read
  actions: write
  issues: write

env:
  STEP_4_FILE: ".github/steps/4-merge-your-pull-request.md"

jobs:
  find_exercise:
    if: |
      !github.event.repository.is_template &&
      github.head_ref == 'my-first-branch'
    name: 演習のIssueを検索
    uses: skills/exercise-toolkit/.github/workflows/find-exercise-issue.yml@v0.7.0
    with:
      issue-title-text: "演習: "

  check_step_work:
    name: ステップの作業を確認
    runs-on: ubuntu-latest
    needs: find_exercise
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: 最新のコメントを検索
        id: find-last-comment
        uses: peter-evans/find-comment@v3
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          direction: last

      - name: コメントを更新 - 作業を確認中
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          file: .github/step-feedback/checking-work.md
          edit-mode: replace

      # 開始: 実践演習の確認

      - name: PRタイトルのキーフレーズを確認
        id: check-pr-title
        continue-on-error: true
        uses: skills/action-keyphrase-checker@v1
        with:
          keyphrase: "ファイルを追加"
          text: ${{ github.event.pull_request.title }}
          case-sensitive: false

      - name: PRの説明が空でないことを確認
        id: check-pr-description
        continue-on-error: true
        run: |
          if [ -n "$PR_BODY" ]; then
            echo "STEP_MESSAGE=プルリクエストの説明" >> $GITHUB_OUTPUT
          else
            echo "STEP_MESSAGE=プルリクエストの説明が空です" >> $GITHUB_OUTPUT
            exit 1
          fi
        env:
          PR_BODY: ${{ github.event.pull_request.body }}

      - name: コメントを更新 - ステップの結果
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          comment-id: ${{ steps.find-last-comment.outputs.comment-id }}
          file: .github/step-feedback/step-results-table.md
          edit-mode: replace
          vars: |
            step_number: 3
            results_table:
              - description: "プルリクエストのタイトルが一致"
                passed: ${{ steps.check-pr-title.outcome == 'success' }}
              - description: ${{ steps.check-pr-description.outputs.STEP_MESSAGE }}
                passed: ${{ steps.check-pr-description.outcome == 'success' }}

      - name: すべてのチェックに合格しなかった場合はジョブを失敗させる
        if: contains(steps.*.outcome, 'failure')
        run: exit 1

  post_next_step_content:
    name: 次のステップの内容を投稿
    needs: [find_exercise, check_step_work]
    runs-on: ubuntu-latest
    env:
      ISSUE_REPOSITORY: ${{ github.repository }}
      ISSUE_NUMBER: ${{ needs.find_exercise.outputs.issue-number }}

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: コメントを作成 - ステップ完了
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: .github/step-feedback/step-finished-prepare-next-step.md
          vars: |
            next_step_number: 4

      - name: コメントを作成 - ステップ内容を追加
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: ${{ env.STEP_4_FILE }}

      - name: コメントを作成 - 進捗を監視中
        uses: GrantBirki/comment@v2.1.1
        with:
          repository: ${{ env.ISSUE_REPOSITORY }}
          issue-number: ${{ env.ISSUE_NUMBER }}
          file: .github/step-feedback/watching-for-progress.md

      - name: 現在のワークフローを無効化し、次を有効化
        run: |
          gh workflow disable "${{github.workflow}}"
          gh workflow enable "Step 4"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
